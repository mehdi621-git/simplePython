name: Deploy

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::533267084857:role/task9j
          aws-region: eu-west-1

      - name: Deploy via SSM
        run: |
           aws ssm send-command \
            --instance-ids "i-0e309ea7055f43c7d" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["whoami && pwd && echo $PATH > /tmp/path.txt && bash /home/ubuntu/deploy.sh"]}' \
            --region eu-west-1
