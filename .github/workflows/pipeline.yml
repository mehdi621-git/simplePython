name: Simple Python Pipeline

# Trigger: Run this whenever you push to the 'main' branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check-code:
    # Use a standard Ubuntu runner (no Docker needed)
    runs-on: ubuntu-latest

    steps:
      # 1. Download your code from GitHub to the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Install the specific Python version
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Install your libraries (if you have a requirements.txt)
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Run your tests
      - name: Run Tests
        run: |
          pip install pytest
          pytest test_app.py